# Little Master III: The Rainbow Jewels — EN translation project
# Consumed by retrotool.project.load_project()

data_dirs = ["tables"]

# LM3-specific top-level keys (loader folds into ProjectConfig.extras)
source_rom = "lm3.sfc"
scripted_output = "out/lm3_scripted.sfc"
final_output = "out/lm3_en.sfc"
font_png = "en_data/fonts/font_accented.png"
font_rom_offset = 0x170000
dialog_text_base = 0x1B83D0
en_data_dir = "en_data/scripts"
jp_data_dir = "jp_data/scripts"
primary_table = "en_data/eng.tbl"
fallback_table = "jp_data/jap.tbl"

[asm_patches]
scripted = [
    "asm/debug_mode_patch.asm",
    "asm/name_expansion_patch.asm",
]
vwf = ["asm/vwf_patch.asm"]

[rom]
name = "Little Master III"
file = "lm3.sfc"
mapping = "lorom"
size = "2M"
expanded_size = "4M"

# [build] — retrotool.project.loader build-infrastructure only.
# (source rom name + file live in [rom]; pipeline in [rom.build] below.)
[build]
assembler = "asar"
output_dir = "out"
cache_dir = "en_data/bin/scripts"

[debugger]
type = "mesen-diz"
pipe_name = "Mesen2Diz_lm3"

# [rom.build] — pipeline-wide config. Sections themselves are auto-included
# from any `tables/<name>.toml` that has a `[section]` sub-table; declared
# once there, not duplicated here. Set `order = [...]` to override auto-sort.
[rom.build]
pad = true
pad-byte = 0xFF
# Default build flavor. Flip to `vwf` (here or via `-D version=vwf`) to apply
# vwf_patch.asm. Referenced by `if=` on inline sections below.
version = "scripted"
# FFC0 overflow tail region. Starts after unit-names (0x220000 + 0x920 + pad)
# and extends through bank $C6..$C8 freespace — lm3 reports ~68 KB total.
freespace = [[0x230200, 0x300000]]
# Match lm3.py script-table iteration order (alphabetical by DataDef name)
# so FFC0 overflow tails get allocated identically. Fixed-records tables
# are independent of this order.
order = []

# Project-wide placement default: in-place + FFC0 overflow for ALL script
# tables. Pointer tables MUST NOT be rewritten — EN entries fit in the
# original JP slot, oversized entries get an FFC0 redirect to freespace.
# Sibling tables (dialog-1..5) share the data region, so any ptr-table
# rewrite corrupts neighbors. Per-table override only if truly needed.
[rom.build.section.placement]
mode = "overflow"

# Project-level defaults inherited by every kind="script" DataDef section
# that doesn't declare its own [section.overflow]. Keeps individual
# tables/*.toml files minimal — they only list [pointers]/[encoding]/[table].
[rom.build.section.overflow]
strategy = "inline-redirect"
marker = "FFC0"
pointer-size = 3
pointer-encoder = "snes-lorom1-24le"
splitter = "ctrl-aware"
slot-measure = "source-entry"

# --- Inline non-DataDef sections: font + graphics + asar patches ---
# Font: 1BPP-IL bitmap pre-built by `python3 lm3.py font` into en_data/bin.
[[rom.build.sections]]
kind = "bin"
offset = 0x170000
file = "en_data/bin/fonts/font_accented_1bppil.bin"

# Title BG1 graphics — plane-pair chunk-stream format decoded by
# `decodeTileStream @ $00:AF6A`, called from `loadTitleGfx @ $01:F060`.
# Pre-built by `python3 tools/title_gfx/build_title.py` from the canonical
# source PNG (en_data/gfx/title_bg1_tiles.png, tile-order layout 256x224).
# Three correlated changes to the ROM:
#   0x118000  directory (8B skip + 7×8B records) + packed command streams
#   0x200000  flat chunk store (16 B per chunk) — moved OUT of bank $23 to
#             avoid stomping battle-scene palette data at $23:D000..F800.
#             SNES $40:8000; lands in clean expansion space before script
#             (0x208000). See asm/title_chunk_relocate.asm header.
#   asar patch: chunk-bank immediate $01:F09D -> #$40,
#               chunk-offset immediate $01:F0A3 -> high byte $80.
# Constraint: dir_streams.bin <= 0x5800 B (bank $23 slot up to palette @
# $F800, but battle palette at $D000 makes effective cap 0x5000; current
# usage ~0x1320 B — ample headroom). chunks.bin <= 0x8000 B (file
# 0x200000..0x208000 before script).
# See docs/ROM_MAP.md and TITLE_GFX_PLAN.md Phase 5 for the full format spec.
[[rom.build.sections]]
kind = "bin"
offset = 0x118000
file = "en_data/bin/gfx/title_dir_streams.bin"

[[rom.build.sections]]
kind = "bin"
offset = 0x200000
file = "en_data/bin/gfx/title_chunks.bin"

[[rom.build.sections]]
kind = "asar"
file = "asm/title_chunk_relocate.asm"

# Legacy 0x11C200 "title bundle" removed 2026-04-18 — was source-ROM
# pass-through; nothing references $23:C200 for title rendering.

# Debug mode: keeps WRAM $0A87 non-zero to unlock scene/variable inspection.
[[rom.build.sections]]
kind = "asar"
file = "asm/debug_mode_patch.asm"

# Unit-names: expand 8->16 byte entries at bank $C4 + pointer-table rewrites.
[[rom.build.sections]]
kind = "asar"
file = "asm/name_expansion_patch.asm"

# VWF: opt-in. Flip `version = "vwf"` in [rom.build] (or `-D version=vwf` on
# CLI) to enable the variable-width-font patch. Default builds skip it.
[[rom.build.sections]]
kind = "asar"
file = "asm/vwf_patch.asm"
if = "${version}==vwf"
