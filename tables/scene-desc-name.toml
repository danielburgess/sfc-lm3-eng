# scene-desc-name

# LM3-specific scalars (top-level for extras)
textbuf_limit = 0x1F0

[table]
name = "scene-desc-name"
type = "pointer"

[encoding]
table_file = "en_data/eng.tbl"
fallback = "jp_data/jap.tbl"
terminator = 0x00

[pointers]
offset = 0x111EE3
count = 158
size = 2

[word_wrap]
line_width = 0x1A
max_lines = 0x6
entries = "0-56"

# Build-pipeline step: assemble script text against the pointer table.
# 141/158 entries overflow their inline slot — redirect via FFC0 marker
# into bank $C6 freespace. Ctrl-aware splitter mirrors LM3 _find_safe_split.
[section]
kind = "script"
