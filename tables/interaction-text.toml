# interaction-text

[table]
name = "interaction-text"
type = "pointer"

[encoding]
table_file = "en_data/eng.tbl"
fallback = "jp_data/jap.tbl"
terminator = 0x00

[pointers]
offset = 0x1BBB4
count = 119
size = 2

[data]
offset = 0x1C0F1

# Build-pipeline step. In-place + FFC0 overflow → bank $C6 freespace.
[section]
kind = "script"
file = "en_data/scripts/interaction-text.txt"

[section.overflow]
strategy = "inline-redirect"
marker = "FFC0"
pointer-size = 3
pointer-encoder = "snes-lorom1-24le"
splitter = "ctrl-aware"
slot-measure = "source-entry"
