# dialog-5

# LM3-specific scalars (top-level for extras)
dialog_group = 0x1

[table]
name = "dialog-5"
type = "pointer"

[encoding]
table_file = "en_data/eng.tbl"
fallback = "jp_data/jap.tbl"
terminator = 0x00

[pointers]
offset = 0x1B8300
count = 104
size = 2

# Build-pipeline step. In-place + FFC0 overflow → bank $C6 freespace.
[section]
kind = "script"
file = "en_data/scripts/dialog-5.txt"

[section.overflow]
strategy = "inline-redirect"
marker = "FFC0"
pointer-size = 3
pointer-encoder = "snes-lorom1-24le"
splitter = "ctrl-aware"
slot-measure = "source-entry"
